name: Sync to Portfolio

on:
  push:
    branches:
      - sanitizer
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          repository: techupgrgbcn-crypto/playball-infra
          token: ${{ secrets.PORTFOLIO_TOKEN }}
          path: portfolio

      - name: Sanitize and copy
        run: |
          cd source

          # AWS Account IDs
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/497012402578/123456789012/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/274130523831/987654321098/g' {} \;

          # Route53 Zone ID
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/Z0444756O5UQIM83AJHO/ZEXAMPLEZONEID/g' {} \;

          # Public IPs
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/122\.34\.166\.131/10.0.0.1/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/39\.119\.192\.15/10.0.0.2/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/118\.221\.42\.243/10.0.0.3/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/121\.183\.205\.167/10.0.0.4/g' {} \;

          # Private IPs
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/192\.168\.45\.123/10.0.0.10/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/192\.168\.45\.154/10.0.0.11/g' {} \;

          # Node names
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/mini-might/worker-node-1/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" -o -name "Makefile" \) \
            -exec sed -i 's/mini-gmk/control-plane-1/g' {} \;

          # Team member emails -> generic
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" \) \
            -exec sed -i 's/212clab@gmail\.com/admin@example.com/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" \) \
            -exec sed -i 's/rhuba23@gmail\.com/editor1@example.com/g' {} \;
          find . -type f \( -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.sh" -o -name "*.md" \) \
            -exec sed -i 's/chamchi0129@gmail\.com/editor2@example.com/g' {} \;

          # Delete files that shouldn't be public
          rm -rf .git .github .terraform/ || true
          find . -name "*.tfstate*" -delete || true
          find . -name "terraform.tfvars" -delete || true
          find . -name ".terraform.lock.hcl" -delete || true
          find . -name "*.tgz" -delete || true
          find . -name "Chart.lock" -delete || true
          find . -name ".DS_Store" -delete || true
          find . -name "*.swp" -delete || true
          find . -name "*.tmp" -delete || true
          find . -name "*.bak" -delete || true

          # Copy to portfolio repo
          cd ..
          rm -rf portfolio/k8s-bootstrap
          mkdir -p portfolio/k8s-bootstrap
          cp -r source/* portfolio/k8s-bootstrap/

      - name: Push to portfolio repo
        run: |
          cd portfolio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --staged --quiet || git commit -m "Sync k8s-bootstrap from 302-goormgb-k8s-bootstrap"
          git push

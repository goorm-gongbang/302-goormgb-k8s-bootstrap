# App of Apps - Root Application (k3s-dev)
# k3s 클러스터의 ArgoCD가 이 앱을 통해 helm repo의 k3s-dev용 앱들을 관리합니다.
#
# Usage: make deploy-root-app
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-k3s-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/k3s-dev
    path: k3s-dev/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

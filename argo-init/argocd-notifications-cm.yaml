# ArgoCD Notifications ConfigMap
# Discord로 배포 알림 전송
#
# 사전 준비:
# 1. external-secret-discord.yaml 적용
# 2. argocd-notifications-secret 생성 확인
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Discord Webhook 서비스 정의 - 앱 배포용
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
      - name: Content-Type
        value: application/json

  # Discord Webhook 서비스 정의 - 인프라용
  service.webhook.discord-infra: |
    url: $discord-webhook-infra-url
    headers:
      - name: Content-Type
        value: application/json

  # 템플릿: 배포 성공
  template.app-deployed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "✅ 배포 성공",
              "description": "**{{.app.metadata.name}}** 배포 완료\n[ArgoCD에서 확인](https://argocd.goormgb.space/applications/argocd/{{.app.metadata.name}})",
              "color": 3066993,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Revision", "value": "{{.app.status.sync.revision | substr 0 7}}", "inline": true}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  # 템플릿: 배포 실패
  template.app-deploy-failed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "❌ 배포 실패",
              "description": "**{{.app.metadata.name}}** 배포 실패\n[ArgoCD에서 확인](https://argocd.goormgb.space/applications/argocd/{{.app.metadata.name}})",
              "color": 15158332,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Error", "value": "```{{.app.status.operationState.message | substr 0 500}}```", "inline": false}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  # 템플릿: Sync 시작
  template.app-sync-running: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "🔄 Sync 진행 중",
              "description": "**{{.app.metadata.name}}** 동기화 시작\n[ArgoCD에서 확인](https://argocd.goormgb.space/applications/argocd/{{.app.metadata.name}})",
              "color": 16776960,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true}
              ]
            }]
          }

  # 템플릿: Health Degraded
  template.app-health-degraded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "⚠️ Health Degraded",
              "description": "**{{.app.metadata.name}}** 상태 비정상\n[ArgoCD에서 확인](https://argocd.goormgb.space/applications/argocd/{{.app.metadata.name}})",
              "color": 16744448,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Health", "value": "{{.app.status.health.status}}", "inline": true},
                {"name": "Message", "value": "{{.app.status.conditions | first | default dict | dig \"message\" \"N/A\" | substr 0 300}}", "inline": false}
              ]
            }]
          }

  # === 인프라용 템플릿 (discord-infra 채널) ===
  template.infra-deployed: |
    webhook:
      discord-infra:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "✅ 인프라 배포 성공",
              "description": "**{{.app.metadata.name}}** 배포 완료",
              "color": 3066993,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Revision", "value": "{{.app.status.sync.revision | substr 0 7}}", "inline": true}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  template.infra-deploy-failed: |
    webhook:
      discord-infra:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "❌ 인프라 배포 실패",
              "description": "**{{.app.metadata.name}}** 배포 실패\n[ArgoCD에서 확인](https://argocd.goormgb.space/applications/argocd/{{.app.metadata.name}})",
              "color": 15158332,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Phase", "value": "{{.app.status.operationState.phase}}", "inline": true},
                {"name": "Error", "value": "```{{.app.status.operationState.message | substr 0 500}}```", "inline": false}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  template.infra-health-degraded: |
    webhook:
      discord-infra:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "⚠️ 인프라 Health Degraded",
              "description": "**{{.app.metadata.name}}** 상태 비정상\n[ArgoCD에서 확인](https://argocd.goormgb.space/applications/argocd/{{.app.metadata.name}})",
              "color": 16744448,
              "fields": [
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Health", "value": "{{.app.status.health.status}}", "inline": true},
                {"name": "Message", "value": "{{.app.status.conditions | first | default dict | dig \"message\" \"N/A\" | substr 0 300}}", "inline": false}
              ]
            }]
          }

  # === 인프라용 트리거 ===
  trigger.on-infra-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [infra-deployed]

  trigger.on-infra-deploy-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [infra-deploy-failed]

  trigger.on-infra-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [infra-health-degraded]

  # === 앱용 트리거 ===
  # 트리거 정의
  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-deployed]

  trigger.on-sync-running: |
    - when: app.status.operationState.phase in ['Running']
      send: [app-sync-running]

  trigger.on-deploy-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-deploy-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # 기본 트리거 (모든 앱에 적용)
  defaultTriggers: |
    - on-sync-running
    - on-deployed
    - on-deploy-failed
    - on-health-degraded

# GitHub SSH Key for ArgoCD
# AWS Secrets Manager에서 가져옴
#
# 사전 준비:
# 1. SSH Key 생성: ssh-keygen -t ed25519 -C "argocd-goormgb" -f ~/.ssh/argocd-goormgb -N ""
# 2. AWS Secrets Manager에 저장: dev/argocd/github-ssh
# 3. GitHub repo → Settings → Deploy keys → Add (공개키)
#
# Usage: kubectl apply -f argo-init/external-secret-github.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-goormgb-helm
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: repo-goormgb-helm
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
        sshPrivateKey: "{{ .sshPrivateKey }}"
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: dev/argocd/github-ssh
        property: sshPrivateKey

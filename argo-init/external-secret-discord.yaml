# Discord Webhook for ArgoCD Notifications
# AWS Secrets Manager에서 가져옴
#
# 사전 준비:
# aws secretsmanager create-secret \
#   --name dev/argocd/discord-webhook \
#   --secret-string '{"webhookUrl":"https://discord.com/api/webhooks/..."}'
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
  data:
    - secretKey: discord-webhook-url
      remoteRef:
        key: dev/argocd/discord-webhook
        property: webhookUrl

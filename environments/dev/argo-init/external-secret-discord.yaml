# Discord Webhook for ArgoCD Notifications
# AWS Secrets Manager에서 가져옴
#
# 시크릿 구조 (dev/argocd/discord-webhook):
# {
#   "discord-webhook-url": "https://discord.com/api/webhooks/...",       # 앱 배포 알림
#   "discord-webhook-infra-url": "https://discord.com/api/webhooks/..."  # 인프라 배포 알림
# }
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
  data:
    # 앱 배포 알림용 (dev-webs)
    - secretKey: discord-webhook-url
      remoteRef:
        key: dev/infra
        property: argocd_discord-webhook-url
    # 인프라 알림용 (postgresql, redis, istio 등)
    - secretKey: discord-webhook-infra-url
      remoteRef:
        key: dev/infra
        property: argocd_discord-webhook-infra-url

# ArgoCD RBAC from AWS Secrets Manager (Staging)
# staging/oauth/rbac/argocd → argocd-rbac-eso secret
#
# Usage: kubectl apply -f staging/argo-init/external-secret-rbac.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-rbac-eso
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-rbac-eso
  data:
    - secretKey: policy_csv
      remoteRef:
        key: staging/oauth/rbac/argocd
        property: policy_csv

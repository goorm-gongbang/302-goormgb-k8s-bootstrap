# App of Apps - Root Application (prod)
# EKS prod 클러스터의 ArgoCD가 이 앱을 통해 helm repo의 prod용 앱들을 관리합니다.
#
# Usage: kubectl apply -f ca-prod/argo-init/root-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/ca-prod
    path: ca-prod/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

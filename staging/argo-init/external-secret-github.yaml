# GitHub SSH Key for ArgoCD (Staging)
# AWS Secrets Manager에서 가져옴 (staging 계정)
#
# 사전 준비:
# 1. SSH Key가 이미 Secrets Manager에 있음: staging/argocd/github-ssh
# 2. GitHub repo → Settings → Deploy keys에 등록 확인
#
# Usage: kubectl apply -f staging/argo-init/external-secret-github.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-goormgb-helm
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: repo-goormgb-helm
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
        sshPrivateKey: "{{ .sshPrivateKey }}"
  data:
    - secretKey: sshPrivateKey
      remoteRef:
        key: staging/argocd/github-ssh
        property: sshPrivateKey

# EC2NodeClass - Karpenter가 프로비저닝할 노드의 AWS 설정
#
# 주의: 환경변수로 대체 필요
#   CLUSTER_NAME: EKS 클러스터 이름
#   KARPENTER_NODE_ROLE: Karpenter 노드 IAM Role 이름
#
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # AMI - Amazon Linux 2023 (EKS 최적화)
  amiSelectorTerms:
    - alias: al2023@latest

  # IAM Role (Terraform에서 생성됨)
  role: "${KARPENTER_NODE_ROLE}"

  # Subnet 선택 (karpenter.sh/discovery 태그로 자동 검색)
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"

  # Security Group 선택 (EKS 클러스터 노드 SG)
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/${CLUSTER_NAME}: owned

  # 메타데이터 설정
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required  # IMDSv2 필수

  # Block Device 설정
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  # User Data (bootstrap)
  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="BOUNDARY"

    --BOUNDARY
    Content-Type: text/x-shellscript; charset="us-ascii"

    #!/bin/bash
    # SSM Agent 확인
    systemctl enable amazon-ssm-agent
    systemctl start amazon-ssm-agent

    --BOUNDARY--

  tags:
    Environment: staging
    ManagedBy: karpenter
